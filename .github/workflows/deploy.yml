# .github/workflows/deploy.yml
#
# CI/CD Pipeline — Smart Energy Grid
# Fog & Edge Computing (H9FECC) | NCI MSc Cloud Computing
#
# Triggers on every push to main branch.
#
# Job 1 — build-and-push:
#   Builds fog-node and sensor-manager Docker images
#   and pushes them to Docker Hub.
#
# Job 2 — deploy:
#   Copies docker-compose.yml and mosquitto.conf to EC2.
#   Writes the .env file from GitHub secrets (keeps credentials off disk).
#   Pulls the new images and restarts all containers.
#
# Required GitHub Secrets (Settings > Secrets > Actions):
#   DOCKERHUB_USERNAME    Docker Hub username
#   DOCKERHUB_TOKEN       Docker Hub access token (not password)
#   EC2_HOST              EC2 public IP or DNS hostname
#   EC2_USER              EC2 login user (ubuntu for Ubuntu AMI)
#   EC2_SSH_KEY           Contents of the EC2 private key (.pem file)
#   AWS_IOT_ENDPOINT      IoT Core endpoint (from AWS Console > IoT > Settings)
#
# Certs (one-time manual step, NOT in GitHub secrets):
#   Run scripts/copy_secrets.sh once after provisioning EC2.
#   Certificates do not need to be re-copied on every deploy.

name: Build, Push & Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:     # allow manual run from GitHub Actions UI

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1: Build Docker images and push to Docker Hub
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build fog-node from project root (Dockerfile is in fog_layer/)
      - name: Build and push fog-node image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./fog_layer/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/smart-energy-fog-node:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/smart-energy-fog-node:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build sensor-manager from project root (Dockerfile is in sensor_layer/)
      - name: Build and push sensor-manager image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./sensor_layer/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/smart-energy-sensor-manager:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/smart-energy-sensor-manager:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Deploy to EC2
  # Waits for build-and-push to succeed before running.
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Copy docker-compose.yml and mosquitto.conf to EC2.
      # These are not sensitive — safe to copy from the repo.
      - name: Copy compose files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "fog_layer/docker-compose.yml,fog_layer/mosquitto.conf"
          target: "~/smart-energy-grid"

      # SSH in to:
      #   1. Write .env from GitHub secrets (no plaintext credentials on disk)
      #   2. Pull latest images from Docker Hub
      #   3. Restart all containers
      - name: Deploy and restart containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Write .env from GitHub secrets.
            # This runs on every deploy so credentials stay current.
            cat > ~/smart-energy-grid/fog_layer/.env << 'ENVEOF'
            MQTT_BROKER_HOST=mosquitto
            MQTT_BROKER_PORT=1883
            AWS_IOT_ENDPOINT=${{ secrets.AWS_IOT_ENDPOINT }}
            AWS_IOT_CERT_PATH=/app/certs/device-certificate.pem.crt
            AWS_IOT_KEY_PATH=/app/certs/private.pem.key
            AWS_IOT_CA_PATH=/app/certs/AmazonRootCA1.pem
            AWS_REGION=us-east-1
            DYNAMODB_TABLE_NAME=smart-energy-readings
            FOG_NODE_ID=fog_node_ec2_01
            ENVEOF

            echo "=== Pulling latest images from Docker Hub ==="
            cd ~/smart-energy-grid/fog_layer
            docker compose pull

            echo "=== Restarting all containers ==="
            docker compose up -d

            echo "=== Container status ==="
            docker compose ps

            echo "=== Recent fog node logs ==="
            docker compose logs --tail=20 fog-node

            echo "=== Deployment complete ==="