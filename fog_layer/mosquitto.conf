# mosquitto.conf
# Configuration file for the Mosquitto MQTT broker.
# This is for local development only — no authentication, no TLS.
# For a real production deployment you'd add username/password and SSL certs.

# --- MQTT listener on port 1883 ---
# This is the standard MQTT port that all our sensor scripts connect to.
listener 1883

# Allow connections without a username and password.
# Fine for local dev — definitely turn this off in production.
allow_anonymous true

# --- WebSocket listener on port 9001 ---
# WebSocket lets a browser subscribe to MQTT topics directly.
# Useful if we build a live dashboard that shows sensor data in real time.
listener 9001
protocol websockets

# --- Logging ---
# Log everything so we can see what's happening when debugging.
# Log entries go to the mosquitto_log volume mounted in docker-compose.
log_type all
log_timestamp true
